<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Custom QR Code & ID Card Generator</title>
    <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0ea5e9;
            --border: rgba(255, 255, 255, 0.25);
        }
        
        /* Applied Digital Profile Theme Background */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050010;
            background-image: 
                radial-gradient(circle at 15% 10%, rgba(60, 25, 100, 0.7) 0%, transparent 40%),
                radial-gradient(circle at 85% 15%, rgba(20, 70, 120, 0.7) 0%, transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(80, 20, 60, 0.4) 0%, transparent 60%),
                radial-gradient(circle at 10% 90%, rgba(15, 60, 90, 0.7) 0%, transparent 45%),
                radial-gradient(circle at 90% 90%, rgba(70, 20, 90, 0.6) 0%, transparent 45%);
            background-attachment: fixed;
            color: #ffffff;
            margin: 0;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
        }

        /* Glassmorphism Main Container */
        .container {
            display: flex;
            gap: 30px;
            max-width: 1400px;
            width: 100%;
            background: rgba(20, 10, 30, 0.3);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .controls {
            flex: 1;
            min-width: 350px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            align-content: start;
        }
        .full-width {
            grid-column: span 2;
        }
        
        .previews {
            flex: 1;
            min-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            border-left: 2px solid rgba(255, 255, 255, 0.1);
            padding-left: 30px;
        }

        h2, h3 {
            margin-top: 0;
            margin-bottom: 5px;
            grid-column: span 2;
            color: #ffffff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        h2 { border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 5px;
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.9);
        }

        /* Glassmorphism Inputs */
        input[type="text"], input[type="number"], input[type="email"], select, textarea {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 5px;
            font-family: 'Inter', sans-serif;
            transition: border 0.3s;
        }
        
        input::placeholder, textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: rgba(140, 100, 220, 0.8);
            background: rgba(255, 255, 255, 0.1);
        }

        /* Select Options Fix for dark theme */
        option {
            background-color: #1a1025;
            color: #ffffff;
        }

        input[type="color"] {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: transparent;
            padding: 2px;
        }
        
        /* Checkbox styling */
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .checkbox-wrapper label {
            margin-bottom: 0;
            cursor: pointer;
        }
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
            font-family: monospace;
            font-size: 0.85em;
        }

        button {
            background-color: rgba(140, 100, 220, 0.8);
            color: white;
            border: 1px solid var(--border);
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.2s ease;
            margin-top: 10px;
            width: 100%;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        button:hover {
            background-color: rgba(140, 100, 220, 1);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(140, 100, 220, 0.4);
        }

        #canvas-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        
        /* --- Glassmorphism Visual Card Styles --- */
        .visual-card {
            width: 100%;
            max-width: 350px;
            background-color: transparent;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 14px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            padding: 25px;
            box-sizing: border-box;
            text-align: center;
            margin: 0 auto;
        }
        .visual-card img {
            max-width: 120px;
            max-height: 60px;
            margin-bottom: 15px;
            display: none; 
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }
        .vc-name { 
            font-size: 22px; 
            font-weight: 700; 
            color: #ffffff; 
            margin: 0 0 5px 0; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .vc-title { 
            font-size: 16px; 
            font-weight: 500; 
            color: rgba(255, 255, 255, 0.9); 
            margin: 0 0 5px 0; 
        }
        .vc-org { 
            font-size: 14px; 
            color: rgba(255, 255, 255, 0.6); 
            margin: 0 0 15px 0; 
        }
        .vc-contact { 
            font-size: 14px; 
            color: #ffffff; 
            margin: 8px 0; 
            font-weight: 500;
        }
        .divider { 
            height: 1px; 
            background: rgba(255, 255, 255, 0.15); 
            margin: 15px 0; 
        }

        @media (max-width: 850px) {
            .previews {
                border-left: none;
                border-top: 2px solid rgba(255, 255, 255, 0.1);
                padding-left: 0;
                padding-top: 30px;
                min-width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="controls">
        <h2>Input Information</h2>
        
        <div class="full-width">
            <input type="text" id="in-name" placeholder="Full Name" value="">
            <input type="text" id="in-title" placeholder="Job Title" value="">
            <input type="text" id="in-org" placeholder="Organization" value="">
            <input type="text" id="in-phone" placeholder="Phone Number" value="">
            <input type="email" id="in-email" placeholder="Email Address" value="">
        </div>

        <div class="full-width">
            <label for="dataInput">Raw QR Code Data (Auto-updates):</label>
            <textarea id="dataInput"></textarea>
        </div>

        <h2 style="margin-top: 15px;">QR Style Settings</h2>

        <div>
            <label for="size">Size (px):</label>
            <input type="number" id="size" value="300" min="100" max="1000">
        </div>
        <div>
            <label for="margin">Margin (px):</label>
            <input type="number" id="margin" value="10" min="0" max="50">
        </div>

        <div class="full-width">
            <label for="dotsType">Dots Style:</label>
            <select id="dotsType">
                <option value="square">Square</option>
                <option value="dots">Dots</option>
                <option value="rounded">Rounded</option>
                <option value="classy">Classy</option>
                <option value="classy-rounded">Classy Rounded</option>
                <option value="extra-rounded">Extra Rounded</option>
            </select>
        </div>
        <div>
            <label for="dotsColorMode">Dots Color Mode:</label>
            <select id="dotsColorMode">
                <option value="solid">Solid Color</option>
                <option value="linear">Linear Gradient</option>
                <option value="radial">Radial Gradient</option>
            </select>
        </div>
        <div>
            <label for="bgColor">Background Color:</label>
            <input type="color" id="bgColor" value="#ffffff">
        </div>
        <div>
            <label for="dotsColor">Dots Color 1:</label>
            <input type="color" id="dotsColor" value="#000000">
        </div>
        <div>
            <label for="dotsColor2">Dots Color 2 (Gradient Only):</label>
            <input type="color" id="dotsColor2" value="#8c64dc">
        </div>

        <div>
            <label for="cornersType">Outer Corner Frame:</label>
            <select id="cornersType">
                <option value="square">Square</option>
                <option value="dot">Dot</option>
                <option value="extra-rounded">Extra Rounded</option>
            </select>
        </div>
        <div>
            <label for="cornersDotType">Inner Corner Shape:</label>
            <select id="cornersDotType">
                <option value="square">Square</option>
                <option value="dot">Dot</option>
            </select>
        </div>
        <div>
            <label for="cornersColor">Corners Color (Outer):</label>
            <input type="color" id="cornersColor" value="#000000">
        </div>
        <div>
            <label for="cornersDotColor">Corners Color (Inner):</label>
            <input type="color" id="cornersDotColor" value="#000000">
        </div>

        <div class="full-width" style="margin-top: 10px;">
            <label for="logoInput">Upload Custom Logo:</label>
            <input type="file" id="logoInput" accept="image/png, image/jpeg, image/webp" style="padding: 6px;">
        </div>
        
        <div>
            <label for="logoSize">Logo Size Multiplier:</label>
            <input type="number" id="logoSize" value="0.4" step="0.1" min="0.1" max="0.8">
        </div>
        <div>
            <label for="logoMargin">Logo Margin (px):</label>
            <input type="number" id="logoMargin" value="5" min="0" max="20">
        </div>

        <div class="full-width checkbox-wrapper">
            <input type="checkbox" id="hideDots" checked>
            <label for="hideDots">Hide QR dots behind logo</label>
        </div>

        <div class="full-width">
            <label for="errorCorrection">Error Correction (Redundancy):</label>
            <select id="errorCorrection">
                <option value="L">Low (7% - Best if no logo)</option>
                <option value="M">Medium (15%)</option>
                <option value="Q" selected>Quartile (25%)</option>
                <option value="H">High (30% - Essential for large logos)</option>
            </select>
        </div>
    </div>

    <div class="previews">
        
        <div style="width: 100%; display: flex; flex-direction: column; align-items: center;">
            <h3 style="text-align: center; border-bottom: none;">Information Photo View</h3>
            <div class="visual-card">
                <img id="card-logo-preview" src="" alt="Logo">
                <h1 class="vc-name" id="vc-name"></h1>
                <p class="vc-title" id="vc-title"></p>
                <p class="vc-org" id="vc-org"></p>
                <div class="divider"></div>
                <p class="vc-contact">📞 <span id="vc-phone"></span></p>
                <p class="vc-contact">✉️ <span id="vc-email"></span></p>
            </div>
        </div>

        <div style="width: 100%; display: flex; flex-direction: column; align-items: center;">
            <h3 style="text-align: center; border-bottom: none;">QR Code Result</h3>
            <div id="canvas-container"></div>
            <button id="downloadBtn" style="max-width: 300px;">Download QR as PNG</button>
        </div>

    </div>
</div>

<script>
    let uploadedLogo = "";
    
    // Initialize default QR Code instance
    const qrCode = new QRCodeStyling({
        width: 300,
        height: 300,
        margin: 10,
        qrOptions: { errorCorrectionLevel: 'Q' },
        imageOptions: { hideBackgroundDots: true, imageSize: 0.4, margin: 5 },
        dotsOptions: { type: "square", color: "#000000" },
        backgroundOptions: { color: "#ffffff" },
        cornersSquareOptions: { type: "square", color: "#000000" },
        cornersDotOptions: { type: "square", color: "#000000" }
    });

    // Render initially
    qrCode.append(document.getElementById("canvas-container"));

    // Function to sync inputs -> Photo Card -> vCard text -> QR Code
    function syncData() {
        const name = document.getElementById('in-name').value;
        const title = document.getElementById('in-title').value;
        const org = document.getElementById('in-org').value;
        const phone = document.getElementById('in-phone').value;
        const email = document.getElementById('in-email').value;

        // Update Photo Card View
        document.getElementById('vc-name').innerText = name || 'Full Name';
        document.getElementById('vc-title').innerText = title || 'Job Title';
        document.getElementById('vc-org').innerText = org || 'Organization';
        document.getElementById('vc-phone').innerText = phone || 'Phone Number';
        document.getElementById('vc-email').innerText = email || 'Email Address';

        // Construct a real vCard standard string using your inputs
        let vcardData = "";
        if (name || title || org || phone || email) {
            vcardData = `BEGIN:VCARD\nVERSION:3.0\nN:${name}\nORG:${org}\nTITLE:${title}\nTEL:${phone}\nEMAIL:${email}\nEND:VCARD`;
        } else {
            vcardData = "Type text here to generate QR";
        }
        
        document.getElementById('dataInput').value = vcardData;
        updateQRCode();
    }

    // Function to update QR code visuals based on settings
    function updateQRCode() {
        let dotsConfig = {
            type: document.getElementById('dotsType').value
        };
        
        const colorMode = document.getElementById('dotsColorMode').value;
        if (colorMode === 'solid') {
            dotsConfig.color = document.getElementById('dotsColor').value;
        } else {
            dotsConfig.gradient = {
                type: colorMode,
                rotation: 0,
                colorStops: [
                    { offset: 0, color: document.getElementById('dotsColor').value },
                    { offset: 1, color: document.getElementById('dotsColor2').value }
                ]
            };
        }

        // Get value directly from textarea to support manual edits
        const textData = document.getElementById('dataInput').value || " ";

        qrCode.update({
            width: parseInt(document.getElementById('size').value),
            height: parseInt(document.getElementById('size').value),
            data: textData,
            margin: parseInt(document.getElementById('margin').value),
            image: uploadedLogo,
            qrOptions: {
                errorCorrectionLevel: document.getElementById('errorCorrection').value
            },
            imageOptions: {
                hideBackgroundDots: document.getElementById('hideDots').checked,
                imageSize: parseFloat(document.getElementById('logoSize').value),
                margin: parseInt(document.getElementById('logoMargin').value)
            },
            dotsOptions: dotsConfig,
            backgroundOptions: {
                color: document.getElementById('bgColor').value,
            },
            cornersSquareOptions: {
                type: document.getElementById('cornersType').value,
                color: document.getElementById('cornersColor').value
            },
            cornersDotOptions: {
                type: document.getElementById('cornersDotType').value,
                color: document.getElementById('cornersDotColor').value
            }
        });
    }

    // Add listeners to Information Inputs
    const infoInputs = document.querySelectorAll('#in-name, #in-title, #in-org, #in-phone, #in-email');
    infoInputs.forEach(input => {
        input.addEventListener('input', syncData);
    });

    // Add listeners to Styling Inputs
    const styleInputs = document.querySelectorAll('#size, #margin, #dotsColor, #dotsColor2, #dotsColorMode, #bgColor, #dotsType, #cornersType, #cornersDotType, #cornersColor, #cornersDotColor, #logoSize, #logoMargin, #hideDots, #errorCorrection');
    styleInputs.forEach(input => {
        input.addEventListener('input', updateQRCode);
    });
    
    document.getElementById('hideDots').addEventListener('change', updateQRCode);

    // Handle Manual Edits to the Textarea separately so it won't be wiped out
    document.getElementById('dataInput').addEventListener('input', updateQRCode);

    // Handle Image Upload
    document.getElementById('logoInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const cardLogo = document.getElementById('card-logo-preview');
        
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                uploadedLogo = event.target.result;
                cardLogo.src = uploadedLogo;
                cardLogo.style.display = 'inline-block';
                updateQRCode();
            };
            reader.readAsDataURL(file);
        } else {
            uploadedLogo = "";
            cardLogo.src = "";
            cardLogo.style.display = 'none';
            updateQRCode();
        }
    });

    // Handle Download
    document.getElementById('downloadBtn').addEventListener('click', () => {
        qrCode.download({
            name: "Custom_QR_Code",
            extension: "png"
        });
    });

    // Initial load
    syncData();
</script>

</body>
</html>
