<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Custom QR Code & ID Card Generator</title>
    <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0ea5e9;
            --border: rgba(255, 255, 255, 0.25);
        }
        
        /* Applied Digital Profile Theme Background */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050010;
            background-image: 
                radial-gradient(circle at 15% 10%, rgba(60, 25, 100, 0.7) 0%, transparent 40%),
                radial-gradient(circle at 85% 15%, rgba(20, 70, 120, 0.7) 0%, transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(80, 20, 60, 0.4) 0%, transparent 60%),
                radial-gradient(circle at 10% 90%, rgba(15, 60, 90, 0.7) 0%, transparent 45%),
                radial-gradient(circle at 90% 90%, rgba(70, 20, 90, 0.6) 0%, transparent 45%);
            background-attachment: fixed;
            color: #ffffff;
            margin: 0;
            padding: 30px 20px;
            display: flex;
            justify-content: center;
        }

        /* Glassmorphism Main Container */
        .container {
            display: flex;
            gap: 30px;
            max-width: 1400px;
            width: 100%;
            background: rgba(20, 10, 30, 0.3);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .controls {
            flex: 1;
            min-width: 350px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            align-content: start;
        }
        .full-width {
            grid-column: span 2;
        }
        
        .previews {
            flex: 1;
            min-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            border-left: 2px solid rgba(255, 255, 255, 0.1);
            padding-left: 30px;
        }

        h2, h3 {
            margin-top: 0;
            margin-bottom: 5px;
            grid-column: span 2;
            color: #ffffff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        h2 { border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 5px;
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.9);
        }

        /* Glassmorphism Inputs */
        input[type="text"], input[type="number"], input[type="email"], input[type="url"], select, textarea {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 5px;
            font-family: 'Inter', sans-serif;
            transition: border 0.3s;
        }
        
        input::placeholder, textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: rgba(140, 100, 220, 0.8);
            background: rgba(255, 255, 255, 0.1);
        }

        /* Select Options Fix for dark theme */
        option {
            background-color: #1a1025;
            color: #ffffff;
        }

        input[type="color"] {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: transparent;
            padding: 2px;
        }
        
        /* Checkbox styling */
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .checkbox-wrapper label {
            margin-bottom: 0;
            cursor: pointer;
        }
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        textarea {
            resize: none; 
            min-height: 44px; 
            height: 44px;
            font-family: 'Inter', sans-serif; 
            font-size: 0.9em;
            overflow: hidden; 
        }

        button {
            background-color: rgba(140, 100, 220, 0.8);
            color: white;
            border: 1px solid var(--border);
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.2s ease;
            margin-top: 10px;
            width: 100%;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        button:hover {
            background-color: rgba(140, 100, 220, 1);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(140, 100, 220, 0.4);
        }

        /* Styling for the Add Field Button */
        #add-field-btn {
            background-color: transparent;
            border: 1px dashed rgba(255, 255, 255, 0.4);
            color: rgba(255, 255, 255, 0.8);
            margin-top: 5px;
            margin-bottom: 15px;
            font-weight: 500;
            font-size: 1.2em; 
            box-shadow: none;
            width: 32px; 
            height: 32px; 
            border-radius: 8px; 
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: auto; 
        }
        #add-field-btn:hover {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.8);
            color: white;
            transform: none;
        }

        .action-group {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 350px;
            margin-top: 5px;
        }

        /* --- Modernized QR Code Canvas Container --- */
        #canvas-container {
            position: relative;
            background: rgba(20, 10, 40, 0.4);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 
                0 20px 50px rgba(0,0,0,0.5),
                inset 0 0 0 1px rgba(255, 255, 255, 0.1),
                inset 0 2px 20px rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.3s ease;
        }

        /* Modern subtle dot pattern overlay */
        #canvas-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(rgba(140, 100, 220, 0.2) 1.5px, transparent 1.5px);
            background-size: 16px 16px;
            z-index: 0;
            opacity: 0.8;
        }

        /* Center glow effect behind the QR code */
        #canvas-container::after {
            content: '';
            position: absolute;
            width: 180px;
            height: 180px;
            background: rgba(140, 100, 220, 0.35);
            filter: blur(60px);
            z-index: 0;
            border-radius: 50%;
        }

        /* Base Target for the actual canvas generated by the library */
        #canvas-container canvas, #canvas-container svg {
            position: relative;
            z-index: 1;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255,255,255,0.1);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease, border-radius 0.4s ease, clip-path 0.4s ease;
        }

        /* --- Dynamic Shape Classes for the QR Canvas --- */
        #canvas-container.shape-default canvas, #canvas-container.shape-default svg { 
            border-radius: 14px; clip-path: none; 
        }
        #canvas-container.shape-leaf canvas, #canvas-container.shape-leaf svg { 
            border-radius: 40px 8px 40px 8px; clip-path: none; 
        }
        #canvas-container.shape-squircle canvas, #canvas-container.shape-squircle svg { 
            border-radius: 40px; clip-path: none; 
        }
        #canvas-container.shape-cyber canvas, #canvas-container.shape-cyber svg { 
            border-radius: 0; clip-path: polygon(8% 0, 92% 0, 100% 8%, 100% 92%, 92% 100%, 8% 100%, 0 92%, 0 8%); 
        }
        #canvas-container.shape-bubble canvas, #canvas-container.shape-bubble svg { 
            border-radius: 40px 40px 40px 8px; clip-path: none; 
        }
        #canvas-container.shape-octagon canvas, #canvas-container.shape-octagon svg { 
            border-radius: 0; clip-path: polygon(15% 0%, 85% 0%, 100% 15%, 100% 85%, 85% 100%, 15% 100%, 0% 85%, 0% 15%); 
        }
        #canvas-container.shape-folded canvas, #canvas-container.shape-folded svg { 
            border-radius: 8px 0 8px 8px; clip-path: polygon(0 0, calc(100% - 25px) 0, 100% 25px, 100% 100%, 0 100%); 
        }

        #canvas-container:hover canvas, #canvas-container:hover svg {
            transform: scale(1.04) translateY(-4px);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.6), 0 0 25px rgba(140, 100, 220, 0.4), 0 0 0 1px rgba(255,255,255,0.3);
        }
        
        /* --- Glassmorphism Visual Card Styles --- */
        .visual-card {
            width: 100%;
            max-width: 380px; 
            background-color: transparent;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 14px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            padding: 25px;
            box-sizing: border-box;
            text-align: center;
            margin: 0 auto;
        }
        .visual-card img {
            max-width: 120px;
            max-height: 60px;
            margin-bottom: 15px;
            display: none; 
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }
        .vc-name { 
            font-size: 22px; 
            font-weight: 700; 
            color: #ffffff; 
            margin: 0 0 5px 0; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .vc-title { 
            font-size: 16px; 
            font-weight: 500; 
            color: rgba(255, 255, 255, 0.9); 
            margin: 0 0 5px 0; 
        }
        .vc-org { 
            font-size: 14px; 
            color: rgba(255, 255, 255, 0.6); 
            margin: 0 0 15px 0; 
        }
        .vc-contact { 
            font-size: 14px; 
            color: #ffffff; 
            margin: 8px 0; 
            font-weight: 500;
            word-break: break-word; 
            line-height: 1.4; 
        }
        .divider { 
            height: 1px; 
            background: rgba(255, 255, 255, 0.15); 
            margin: 15px 0; 
        }

        @media (max-width: 850px) {
            .previews {
                border-left: none;
                border-top: 2px solid rgba(255, 255, 255, 0.1);
                padding-left: 0;
                padding-top: 30px;
                min-width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="controls">
        <h2>Input Information</h2>
        
        <div class="full-width">
            <input type="text" id="in-name" placeholder="Full Name" value="">
            <input type="text" id="in-title" placeholder="Job Title" value="">
            <input type="text" id="in-org" placeholder="Organization" value="">
            <input type="text" id="in-phone" placeholder="Phone Number" value="">
            <input type="email" id="in-email" placeholder="Email Address" value="">
            <input type="url" id="in-website" placeholder="Website URL (https://example.com)" value="">
            
            <div id="custom-fields-container"></div>
            
            <button id="add-field-btn" title="Add Custom Field">+</button>
        </div>

        <div class="full-width">
            <label for="dataInput">Custom QR Link/Text (Leave blank to use Profile Info):</label>
            <textarea id="dataInput" spellcheck="false" placeholder="Type a custom URL or text here..."></textarea>
        </div>

        <h2 style="margin-top: 15px;">QR Style Settings</h2>

        <div>
            <label for="size">Size (px):</label>
            <input type="number" id="size" value="300" min="100" max="1000">
        </div>
        <div>
            <label for="margin">Margin (px):</label>
            <input type="number" id="margin" value="10" min="0" max="50">
        </div>

        <div class="full-width">
            <label for="containerShape">Container Shape:</label>
            <select id="containerShape">
                <option value="shape-default">Soft Square (Default)</option>
                <option value="shape-leaf">Modern Leaf</option>
                <option value="shape-squircle">Squircle</option>
                <option value="shape-bubble">Message Bubble</option>
                <option value="shape-cyber">Cyberpunk Cut</option>
                <option value="shape-octagon">Octagon</option>
                <option value="shape-folded">Folded Corner</option>
            </select>
        </div>

        <div class="full-width">
            <label for="dotsType">Dots Style:</label>
            <select id="dotsType">
                <option value="square">Square</option>
                <option value="dots">Dots</option>
                <option value="rounded">Rounded</option>
                <option value="classy">Classy</option>
                <option value="classy-rounded">Classy Rounded</option>
                <option value="extra-rounded">Extra Rounded</option>
            </select>
        </div>
        <div>
            <label for="dotsColorMode">Dots Color Mode:</label>
            <select id="dotsColorMode">
                <option value="solid">Solid Color</option>
                <option value="linear">Linear Gradient (Horizontal)</option>
                <option value="linear-vertical">Linear Gradient (Vertical)</option>
                <option value="linear-diagonal">Linear Gradient (Diagonal)</option>
                <option value="radial">Radial Gradient</option>
            </select>
        </div>
        <div>
            <label for="bgColor">Background Color:</label>
            <input type="color" id="bgColor" value="#ffffff">
        </div>
        <div>
            <label for="dotsColor">Dots Color 1:</label>
            <input type="color" id="dotsColor" value="#000000">
        </div>
        <div>
            <label for="dotsColor2">Dots Color 2 (Gradient Only):</label>
            <input type="color" id="dotsColor2" value="#8c64dc">
        </div>

        <div>
            <label for="cornersType">Outer Corner Frame:</label>
            <select id="cornersType">
                <option value="square">Square</option>
                <option value="dot">Dot</option>
                <option value="extra-rounded">Extra Rounded</option>
            </select>
        </div>
        <div>
            <label for="cornersDotType">Inner Corner Shape:</label>
            <select id="cornersDotType">
                <option value="square">Square</option>
                <option value="dot">Dot</option>
            </select>
        </div>
        <div>
            <label for="cornersColor">Corners Color (Outer):</label>
            <input type="color" id="cornersColor" value="#000000">
        </div>
        <div>
            <label for="cornersDotColor">Corners Color (Inner):</label>
            <input type="color" id="cornersDotColor" value="#000000">
        </div>

        <div class="full-width" style="margin-top: 10px;">
            <label for="logoInput">Upload Custom Logo:</label>
            <input type="file" id="logoInput" accept="image/png, image/jpeg, image/webp" style="padding: 6px;">
        </div>
        
        <div>
            <label for="logoSize">Logo Size Multiplier:</label>
            <input type="number" id="logoSize" value="0.4" step="0.1" min="0.1" max="0.8">
        </div>
        <div>
            <label for="logoMargin">Logo Margin (px):</label>
            <input type="number" id="logoMargin" value="5" min="0" max="20">
        </div>

        <div class="full-width checkbox-wrapper">
            <input type="checkbox" id="hideDots" checked>
            <label for="hideDots">Hide QR dots behind logo</label>
        </div>

        <div class="full-width">
            <label for="errorCorrection">Error Correction (Redundancy):</label>
            <select id="errorCorrection">
                <option value="L">Low (7% - Best if no logo)</option>
                <option value="M">Medium (15%)</option>
                <option value="Q" selected>Quartile (25%)</option>
                <option value="H">High (30% - Essential for large logos)</option>
            </select>
        </div>
    </div>

    <div class="previews">
        
        <div style="width: 100%; display: flex; flex-direction: column; align-items: center;">
            <h3 style="text-align: center; border-bottom: none;">Information Photo View</h3>
            <div class="visual-card">
                <img id="card-logo-preview" src="" alt="Logo">
                <h1 class="vc-name" id="vc-name"></h1>
                <p class="vc-title" id="vc-title"></p>
                <p class="vc-org" id="vc-org"></p>
                <div class="divider"></div>
                <p class="vc-contact">📞 <span id="vc-phone"></span></p>
                <p class="vc-contact">✉️ <span id="vc-email"></span></p>
                <p class="vc-contact" id="vc-web-container" style="display: none;">🌐 <span id="vc-website"></span></p>
                
                <div id="vc-dynamic-list"></div>
            </div>
        </div>

        <div style="width: 100%; display: flex; flex-direction: column; align-items: center;">
            <h3 style="text-align: center; border-bottom: none;">QR Code Result</h3>
            <div id="canvas-container" class="shape-default"></div>
            
            <div class="action-group">
                <select id="downloadFormat" style="margin-top: 10px; width: 35%;">
                    <option value="png">PNG</option>
                    <option value="svg">SVG</option>
                    <option value="jpeg">JPEG</option>
                    <option value="webp">WEBP</option>
                </select>
                <button id="downloadBtn" style="width: 65%;">Download QR</button>
            </div>
        </div>

    </div>
</div>

<script>
    let uploadedLogo = "";
    // Store the generated vCard data behind the scenes
    let generatedVCard = ""; 
    
    // Listen for manual container shape changes
    document.getElementById('containerShape').addEventListener('change', function(e) {
        const canvasContainer = document.getElementById('canvas-container');
        // Apply the new class selected from the dropdown
        canvasContainer.className = e.target.value;
    });
    
    // Initialize default QR Code instance
    const qrCode = new QRCodeStyling({
        width: 300,
        height: 300,
        margin: 10,
        qrOptions: { errorCorrectionLevel: 'Q' },
        imageOptions: { hideBackgroundDots: true, imageSize: 0.4, margin: 5 },
        dotsOptions: { type: "square", color: "#000000" },
        backgroundOptions: { color: "#ffffff" },
        cornersSquareOptions: { type: "square", color: "#000000" },
        cornersDotOptions: { type: "square", color: "#000000" }
    });

    // Render initially
    qrCode.append(document.getElementById("canvas-container"));

    // Handle adding dynamic custom fields
    document.getElementById('add-field-btn').addEventListener('click', function(e) {
        e.preventDefault();
        const container = document.getElementById('custom-fields-container');
        
        const fieldRow = document.createElement('div');
        fieldRow.className = 'custom-field-row';
        fieldRow.style.display = 'flex';
        fieldRow.style.gap = '10px';
        fieldRow.style.marginBottom = '5px';
        
        fieldRow.innerHTML = `
            <input type="text" class="custom-title-input" placeholder="Title" style="width: 35%; margin-bottom: 0;">
            <input type="text" class="custom-info-input" placeholder="Information / URL" style="width: 55%; margin-bottom: 0;">
            <button class="remove-btn" style="width: 10%; margin-top: 0; padding: 0; background-color: rgba(220, 50, 50, 0.3); border: none; font-size: 1.2em; border-radius: 8px;">×</button>
        `;
        
        container.appendChild(fieldRow);
        
        // Add listeners to new inputs
        fieldRow.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', syncData);
        });
        
        // Add listener to remove button
        fieldRow.querySelector('.remove-btn').addEventListener('click', function() {
            fieldRow.remove();
            syncData(); // Re-sync without this field
        });
    });

    // Function to sync inputs -> Photo Card -> vCard text -> QR Code
    function syncData() {
        const name = document.getElementById('in-name').value;
        const title = document.getElementById('in-title').value;
        const org = document.getElementById('in-org').value;
        const phone = document.getElementById('in-phone').value;
        const email = document.getElementById('in-email').value;
        const website = document.getElementById('in-website').value;

        // Update Photo Card View
        document.getElementById('vc-name').innerText = name || 'Full Name';
        document.getElementById('vc-title').innerText = title || 'Job Title';
        document.getElementById('vc-org').innerText = org || 'Organization';
        document.getElementById('vc-phone').innerText = phone || 'Phone Number';
        document.getElementById('vc-email').innerText = email || 'Email Address';
        
        // Handle conditional display for website
        document.getElementById('vc-website').innerText = website;
        document.getElementById('vc-web-container').style.display = website ? 'block' : 'none';

        // Base vCard Data
        generatedVCard = `BEGIN:VCARD\nVERSION:3.0\nN:${name};;;;\nFN:${name}\nORG:${org}\nTITLE:${title}\nTEL;TYPE=work,voice:${phone}\nEMAIL;TYPE=work:${email}`;
        if(website) generatedVCard += `\nURL:${website}`;
        
        // Handle dynamic custom fields
        const dynamicListContainer = document.getElementById('vc-dynamic-list');
        dynamicListContainer.innerHTML = ''; // Clear preview list to re-render
        
        const customRows = document.querySelectorAll('.custom-field-row');
        customRows.forEach(row => {
            const rowTitle = row.querySelector('.custom-title-input').value.trim();
            const rowInfo = row.querySelector('.custom-info-input').value.trim();
            
            if (rowInfo) {
                // Add to visual card
                const p = document.createElement('p');
                p.className = 'vc-contact';
                p.style.margin = '8px 0';
                p.innerHTML = `📌 <span style="opacity: 0.8; font-size: 0.9em; margin-right: 4px;">${rowTitle ? rowTitle + ":" : ""}</span><span>${rowInfo}</span>`;
                dynamicListContainer.appendChild(p);
                
                // Add to vCard string
                if(rowInfo.startsWith('http')) {
                    generatedVCard += `\nURL;TYPE=${rowTitle || 'Custom'}:${rowInfo}`;
                } else {
                    generatedVCard += `\nNOTE:${rowTitle ? rowTitle + ': ' : ''}${rowInfo}`;
                }
            }
        });
        
        generatedVCard += `\nEND:VCARD`;
        
        updateQRCode();
    }

    // Function to update QR code visuals based on settings
    function updateQRCode() {
        // Build dots options based on solid vs gradient
        let dotsConfig = {
            type: document.getElementById('dotsType').value
        };
        
        const colorModeValue = document.getElementById('dotsColorMode').value;
        
        if (colorModeValue === 'solid') {
            dotsConfig.color = document.getElementById('dotsColor').value;
            dotsConfig.gradient = null; // Explicitly erase the old gradient state
        } else {
            let gradType = 'linear';
            let gradRotation = 0;

            if (colorModeValue === 'linear-vertical') {
                gradType = 'linear';
                gradRotation = Math.PI / 2; // 90 degrees
            } else if (colorModeValue === 'linear-diagonal') {
                gradType = 'linear';
                gradRotation = Math.PI / 4; // 45 degrees
            } else if (colorModeValue === 'radial') {
                gradType = 'radial';
            }

            dotsConfig.gradient = {
                type: gradType,
                rotation: gradRotation,
                colorStops: [
                    { offset: 0, color: document.getElementById('dotsColor').value },
                    { offset: 1, color: document.getElementById('dotsColor2').value }
                ]
            };
        }

        // Check if user manually typed anything in the custom box
        let customInput = document.getElementById('dataInput').value.trim();
        // If they did, use their custom text. If not, use the background generated vCard
        let finalData = customInput !== "" ? customInput : generatedVCard;

        qrCode.update({
            width: parseInt(document.getElementById('size').value),
            height: parseInt(document.getElementById('size').value),
            data: finalData,
            margin: parseInt(document.getElementById('margin').value),
            image: uploadedLogo,
            qrOptions: {
                errorCorrectionLevel: document.getElementById('errorCorrection').value
            },
            imageOptions: {
                hideBackgroundDots: document.getElementById('hideDots').checked,
                imageSize: parseFloat(document.getElementById('logoSize').value),
                margin: parseInt(document.getElementById('logoMargin').value)
            },
            dotsOptions: dotsConfig,
            backgroundOptions: {
                color: document.getElementById('bgColor').value,
            },
            cornersSquareOptions: {
                type: document.getElementById('cornersType').value,
                color: document.getElementById('cornersColor').value
            },
            cornersDotOptions: {
                type: document.getElementById('cornersDotType').value,
                color: document.getElementById('cornersDotColor').value
            }
        });
    }

    // Add listeners to static Information Inputs
    const infoInputs = document.querySelectorAll('#in-name, #in-title, #in-org, #in-phone, #in-email, #in-website');
    infoInputs.forEach(input => {
        input.addEventListener('input', syncData);
    });

    // Add listeners to Styling Inputs
    const styleInputs = document.querySelectorAll('#size, #margin, #dotsColor, #dotsColor2, #dotsColorMode, #bgColor, #dotsType, #cornersType, #cornersDotType, #cornersColor, #cornersDotColor, #logoSize, #logoMargin, #hideDots, #errorCorrection');
    styleInputs.forEach(input => {
        input.addEventListener('input', updateQRCode);
    });
    
    // Specifically handle checkboxes
    document.getElementById('hideDots').addEventListener('change', updateQRCode);

    // Auto-expand the Custom Text Box and Update QR
    const dataInputArea = document.getElementById('dataInput');
    dataInputArea.addEventListener('input', function() {
        this.style.height = 'auto'; // Reset size to recalculate
        this.style.height = (this.scrollHeight + 2) + 'px'; // Expand to fit content completely
        updateQRCode();
    });

    // Handle Image Upload (Updates both QR Code and Photo Card View)
    document.getElementById('logoInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const cardLogo = document.getElementById('card-logo-preview');
        
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                uploadedLogo = event.target.result;
                cardLogo.src = uploadedLogo;
                cardLogo.style.display = 'inline-block';
                updateQRCode();
            };
            reader.readAsDataURL(file);
        } else {
            uploadedLogo = "";
            cardLogo.src = "";
            cardLogo.style.display = 'none';
            updateQRCode();
        }
    });

    // Handle Download with dynamic format extension
    document.getElementById('downloadBtn').addEventListener('click', () => {
        const selectedFormat = document.getElementById('downloadFormat').value;
        qrCode.download({
            name: "Custom_QR_Profile",
            extension: selectedFormat
        });
    });

    // Initial load
    syncData();
</script>

</body>
</html>
